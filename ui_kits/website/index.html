<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shri Kuber Group — The Power of Trust</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface-page); }
  #root { min-height: 100vh; }
  .skg-loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }

  /* ---- Responsive ---- */
  .header-menu { display: none; }
  @media (max-width: 900px) {
    .site-nav, .header-cta { display: none !important; }
    .header-menu { display: inline-flex !important; }
    .util-contact span:first-child { display: none; }
    .hero-grid, .manifesto-grid, .featured-grid, .detail-hero, .narrative-grid,
    .material-grid, .contact-grid, .cta-grid { grid-template-columns: 1fr !important; }
    .divisions-grid, .projects-grid, .flow-grid, .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .hero-stats, .spec-grid { grid-template-columns: 1fr 1fr !important; }
    .principle-row { grid-template-columns: 0.2fr 1fr !important; }
    .principle-row p { grid-column: 1 / -1; }
  }
  @media (max-width: 560px) {
    .divisions-grid, .projects-grid, .flow-grid, .footer-grid,
    .hero-stats, .spec-grid, .form-row, .materials-row, .detail-gallery { grid-template-columns: 1fr !important; }
    .footer-legal { flex-direction: column; gap: 0.5rem; text-align: center; }
  }
</style>
</head>
<body>
  <div id="root"><div class="skg-loading">Loading — Shri Kuber Group</div></div>

  <script src="../../_ds_bundle.js"></script>
