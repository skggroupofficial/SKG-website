<!-- @dsCard group="Slides" viewport="1280x720" name="Statement" subtitle="Big editorial quote on tobacco" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; position: relative; overflow: hidden; background: var(--tobacco-900); color: var(--bone-200); }
  .lattice { position: absolute; inset: 0; opacity: .5; }
  .pad { position: absolute; inset: 0; padding: 88px 110px; display: flex; flex-direction: column; justify-content: center; }
  .star { color: var(--brass-300); font-size: 30px; margin-bottom: 30px; }
  .quote { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 60px; line-height: 1.18; color: var(--bone-100); max-width: 22ch; letter-spacing: 0.005em; }
  .cite { margin-top: 46px; font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-on-dark-faint); }
  .cite b { color: var(--brass-300); font-weight: 400; }
</style>
</head>
<body>
  <div class="slide">
    <div class="lattice skg-lattice--dark"></div>
    <div class="pad">
      <div class="star">✦</div>
      <div class="quote">We build places that outlast the conversation about them.</div>
      <div class="cite"><b>Rahul Kuber</b> · Managing Director</div>
    </div>
  </div>
</body>
</html>
