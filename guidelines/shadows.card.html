<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 32px; }
  .row { display: flex; gap: 28px; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box { width: 116px; height: 74px; background: var(--surface-raised-2); border: 1px solid var(--border-subtle); }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="tok">shadow-xs</span></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="tok">shadow-sm</span></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="tok">shadow-md</span></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="tok">shadow-lg</span></div>
  </div>
</body>
</html>
