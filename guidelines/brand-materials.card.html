<!-- @dsCard group="Brand" viewport="700x190" name="Materials" subtitle="Limestone · Aged Timber · Brass · Natural Linen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px 32px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 72px; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-display); font-size: 15px; color: var(--text-primary); margin-top: 11px; }
  .desc { font-family: var(--font-body); font-weight: 300; font-size: 11.5px; line-height: 1.4; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--material-limestone)"></div><div class="name">Limestone</div><div class="desc">Cladding, plinths, paving</div></div>
    <div class="sw"><div class="chip" style="background:var(--material-aged-timber)"></div><div class="name">Aged Timber</div><div class="desc">Millwork, soffits — oil, never lacquer</div></div>
    <div class="sw"><div class="chip" style="background:var(--material-brass)"></div><div class="name">Brass</div><div class="desc">Hardware, signage — patina in place</div></div>
    <div class="sw"><div class="chip" style="background:var(--material-natural-linen)"></div><div class="name">Natural Linen</div><div class="desc">Upholstery, acoustic panels</div></div>
  </div>
</body>
</html>
