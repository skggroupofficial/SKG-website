<!-- @dsCard group="Colors" viewport="700x190" name="Brand Anchors" subtitle="Architectural Earth — Bone · Tobacco · Brass · Jade" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 84px; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-display); font-size: 16px; color: var(--text-primary); margin-top: 12px; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em; color: var(--text-muted); margin-top: 3px; }
  .use { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--skg-bone-cream);"></div>
      <div class="name">Bone Cream</div>
      <div class="meta">#F4EFE4 · PMS 9123 C</div>
      <div class="use">Primary BG · 60%</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--skg-tobacco);"></div>
      <div class="name">Tobacco</div>
      <div class="meta">#2C1C10 · PMS 476 C</div>
      <div class="use">Type · BG Alt · 25%</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--skg-aged-brass);"></div>
      <div class="name">Aged Brass</div>
      <div class="meta">#A07830 · PMS 131 C</div>
      <div class="use">Accent · Rules · 10%</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--skg-smoky-jade);"></div>
      <div class="name">Smoky Jade</div>
      <div class="meta">#3E5E50 · PMS 627 C</div>
      <div class="use">Highlight · 5%</div>
    </div>
  </div>
</body>
</html>
