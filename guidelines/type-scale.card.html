<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="11 → 120px · Playfair display, Libre Franklin UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 32px; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); width: 116px; flex: none; }
  .sample { font-family: var(--font-display); color: var(--text-primary); line-height: 1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="tok">6xl · 120</span><span class="sample" style="font-size:40px">Shri Kuber</span></div>
  <div class="row"><span class="tok">4xl · 64</span><span class="sample" style="font-size:32px">Develop · Build · Host</span></div>
  <div class="row"><span class="tok">2xl · 36</span><span class="sample" style="font-size:24px">A long-horizon firm</span></div>
  <div class="row"><span class="tok">lg · 22</span><span class="sample" style="font-size:18px">Vertically integrated</span></div>
  <div class="row"><span class="tok">md · 17</span><span class="sample" style="font-family:var(--font-body); font-size:15px; color:var(--text-secondary)">Body — shapers of place</span></div>
  <div class="row"><span class="tok">xs · 12</span><span class="sample" style="font-family:var(--font-mono); font-size:11px; letter-spacing:.2em; color:var(--text-muted)">PHASE 01</span></div>
</body>
</html>
