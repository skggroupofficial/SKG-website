<!-- @dsCard group="Brand" viewport="700x200" name="Monogram & Tagline" subtitle="SKG cipher · skyscraper through the K · arc base" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 32px 36px; display: flex; align-items: center; gap: 40px; }
  .mark { width: 150px; flex: none; }
  .mark img { width: 100%; height: auto; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .tagline { font-family: var(--font-mono); font-size: 13px; letter-spacing: .28em; text-transform: uppercase; color: var(--accent); }
  .rule { display:flex; align-items:center; gap:14px; color: var(--accent); }
  .rule::before, .rule::after { content:""; flex:1; height:1px; background: var(--rule-gold); opacity:.5; }
  .rule span { font-size: 13px; }
  .note { font-family: var(--font-body); font-size: 13px; line-height: 1.55; color: var(--text-secondary); max-width: 300px; }
</style>
</head>
<body>
  <div class="mark"><img src="../assets/logo/skg-monogram-gold.png" alt="SKG monogram" /></div>
  <div class="stack">
    <div class="rule"><span>✦</span></div>
    <div class="tagline">The Power of Trust</div>
    <p class="note">The interlocked S·K·G reads as a single cipher. A skyscraper rises through the K; an arc grounds the mark. Use the full lockup for primary placement, the monogram where space is tight.</p>
  </div>
</body>
</html>
