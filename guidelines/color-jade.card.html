<!-- @dsCard group="Colors" viewport="700x150" name="Smoky Jade" subtitle="The quiet highlight — used at ~5%, never dominant" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .ramp { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 70px; border: 1px solid var(--border-subtle); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--jade-700)"></div><div class="tok">700</div><div class="hex">#2C463B</div></div>
    <div class="sw"><div class="chip" style="background:var(--jade-600)"></div><div class="tok">600</div><div class="hex">#34503F</div></div>
    <div class="sw"><div class="chip" style="background:var(--jade-500)"></div><div class="tok">500</div><div class="hex">#3E5E50</div></div>
    <div class="sw"><div class="chip" style="background:var(--jade-400)"></div><div class="tok">400</div><div class="hex">#58786A</div></div>
    <div class="sw"><div class="chip" style="background:var(--jade-300)"></div><div class="tok">300</div><div class="hex">#88A092</div></div>
    <div class="sw"><div class="chip" style="background:var(--jade-200)"></div><div class="tok">200</div><div class="hex">#C3D2C9</div></div>
  </div>
</body>
</html>
