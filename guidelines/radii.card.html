<!-- @dsCard group="Spacing" viewport="700x170" name="Radii — Architectural" subtitle="Near-square forms · 0 → 6px · pill for tags only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px 32px; }
  .row { display: flex; gap: 26px; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 11px; }
  .box { width: 76px; height: 56px; background: var(--bone-300); border: 1px solid var(--border-default); }
  .box.brass { background: var(--accent-soft); border-color: var(--accent); }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:var(--radius-none)"></div><span class="tok">none · 0</span></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tok">xs · 2</span></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">md · 4</span></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">lg · 6</span></div>
    <div class="sw"><div class="box brass" style="border-radius:var(--radius-pill); width:108px"></div><span class="tok">pill · tags</span></div>
  </div>
</body>
</html>
