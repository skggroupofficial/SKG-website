<!-- @dsCard group="Colors" viewport="700x150" name="Brass & Gold" subtitle="The metallic accent — rules, emphasis, hover" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .ramp { display: grid; grid-template-columns: repeat(8, 1fr); gap: 9px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 70px; border: 1px solid var(--border-subtle); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--brass-800)"></div><div class="tok">800</div><div class="hex">#6E4F1E</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-700)"></div><div class="tok">700</div><div class="hex">#835E24</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-600)"></div><div class="tok">600</div><div class="hex">#8E6A2A</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-500)"></div><div class="tok">500</div><div class="hex">#A07830</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-400)"></div><div class="tok">400</div><div class="hex">#B68E47</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-300)"></div><div class="tok">300</div><div class="hex">#CBA968</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-200)"></div><div class="tok">200</div><div class="hex">#E2D2AC</div></div>
    <div class="sw"><div class="chip" style="background:var(--brass-100)"></div><div class="tok">100</div><div class="hex">#EFE6CF</div></div>
  </div>
</body>
</html>
