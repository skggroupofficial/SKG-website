<!-- @dsCard group="Colors" viewport="700x150" name="Bone & Neutrals" subtitle="Warm off-whites, linen and limestone tints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .ramp { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 70px; border: 1px solid var(--border-subtle); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--bone-50)"></div><div class="tok">50</div><div class="hex">#FCFAF6</div></div>
    <div class="sw"><div class="chip" style="background:var(--bone-100)"></div><div class="tok">100</div><div class="hex">#F8F4EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--bone-200)"></div><div class="tok">200</div><div class="hex">#F4EFE4</div></div>
    <div class="sw"><div class="chip" style="background:var(--bone-300)"></div><div class="tok">300</div><div class="hex">#EDE6D8</div></div>
    <div class="sw"><div class="chip" style="background:var(--bone-400)"></div><div class="tok">400</div><div class="hex">#E1D7C5</div></div>
    <div class="sw"><div class="chip" style="background:var(--bone-500)"></div><div class="tok">500</div><div class="hex">#CDBDA2</div></div>
    <div class="sw"><div class="chip" style="background:var(--bone-600)"></div><div class="tok">600</div><div class="hex">#B3A184</div></div>
  </div>
</body>
</html>
