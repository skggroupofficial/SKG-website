<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 30px 32px; }
  .spec { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .big { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 44px; line-height: 1.1; letter-spacing: .005em; color: var(--text-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="spec">— Display Italic</div>
  <div class="big">A partnership built on lasting&nbsp;ground.</div>
  <div class="meta">Playfair Display · Italic 400 · 28–48px · line-height 1.1 · tracking +0.005em</div>
</body>
</html>
