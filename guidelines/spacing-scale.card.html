<!-- @dsCard group="Spacing" viewport="700x250" name="Spacing Scale" subtitle="4px base grid · space-1 → space-11" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 32px; }
  .row { display: flex; align-items: center; gap: 16px; padding: 3.5px 0; }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); width: 92px; flex: none; }
  .bar { height: 14px; background: var(--accent); opacity: .85; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
  <div class="row"><span class="tok">space-2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="row"><span class="tok">space-3</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
  <div class="row"><span class="tok">space-4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="row"><span class="tok">space-5</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
  <div class="row"><span class="tok">space-6</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
  <div class="row"><span class="tok">space-8</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
  <div class="row"><span class="tok">space-9</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
  <div class="row"><span class="tok">space-10</span><span class="bar" style="width:96px"></span><span class="px">96</span></div>
  <div class="row"><span class="tok">space-11</span><span class="bar" style="width:128px"></span><span class="px">128</span></div>
</body>
</html>
