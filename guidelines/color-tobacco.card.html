<!-- @dsCard group="Colors" viewport="700x150" name="Tobacco & Browns" subtitle="Dark grounds, aged timber, secondary text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .ramp { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; }
  .chip { height: 70px; border: 1px solid var(--border-subtle); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--tobacco-900)"></div><div class="tok">900</div><div class="hex">#1E120A</div></div>
    <div class="sw"><div class="chip" style="background:var(--tobacco-800)"></div><div class="tok">800</div><div class="hex">#2C1C10</div></div>
    <div class="sw"><div class="chip" style="background:var(--tobacco-700)"></div><div class="tok">700</div><div class="hex">#3A2717</div></div>
    <div class="sw"><div class="chip" style="background:var(--tobacco-600)"></div><div class="tok">600</div><div class="hex">#5A4330</div></div>
    <div class="sw"><div class="chip" style="background:var(--tobacco-500)"></div><div class="tok">500</div><div class="hex">#6E5238</div></div>
    <div class="sw"><div class="chip" style="background:var(--tobacco-400)"></div><div class="tok">400</div><div class="hex">#8A6E50</div></div>
  </div>
</body>
</html>
